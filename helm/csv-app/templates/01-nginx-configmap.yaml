apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: webapp
  labels:
    app: webapp
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;

    events {
      worker_connections  1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      gzip          on;
      gzip_types    text/css application/javascript application/json image/svg+xml;

      server {
        listen 80;
        server_name _;

        # Served directly by nginx from the shared emptyDir volume
        location /static/ {
          alias /usr/share/nginx/html/static/;
          expires 7d;
          add_header Cache-Control "public, max-age=604800, immutable";
          try_files $uri =404;
        }

        # Health check endpoint — nginx responds directly
        # so pods pass readiness even if Flask is still starting
        location /healthz {
          access_log off;
          return 200 "ok\n";
          add_header Content-Type text/plain;
        }

        # Everything else proxied to Flask csv-app on port 5000
        location / {
          proxy_pass         http://127.0.0.1:5000;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_read_timeout 60s;
          proxy_connect_timeout 10s;
        }
      }
    }