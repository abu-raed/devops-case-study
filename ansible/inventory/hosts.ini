# Configuration management here targets the Kubernetes API (via the
# kubernetes.core collection), so "hosts" are logical environments
# rather than SSH targets. Each runs from localhost with a different
# kubeconfig context.

[staging]
localhost ansible_connection=local kubeconfig_context=devops-case-staging.k8s.local

[production]
localhost ansible_connection=local kubeconfig_context=devops-case.k8s.local

[k8s_clusters:children]
staging
production
