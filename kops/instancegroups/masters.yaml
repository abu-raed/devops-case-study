# Two master instance groups providing HA control plane.
# On-demand only — masters should never run on spot.
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: master-us-east-1a
  labels:
    kops.k8s.io/cluster: devops-case.k8s.local
spec:
  role: Master
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server
  machineType: m5.large
  minSize: 1
  maxSize: 1
  subnets:
  - us-east-1a
  rootVolumeSize: 64
  rootVolumeType: gp3
  nodeLabels:
    kops.k8s.io/instancegroup: master-us-east-1a
  cloudLabels:
    Environment: production
    Role: control-plane

